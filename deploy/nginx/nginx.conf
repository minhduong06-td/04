events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    limit_req_status 429;
    limit_conn_status 429;

    limit_req_zone $binary_remote_addr zone=submit_ip:20m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=poll_ip:20m rate=120r/m;
    limit_conn_zone $binary_remote_addr zone=conn_ip:20m;

    client_max_body_size 11m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 15s;
    keepalive_timeout 15s;
    keepalive_requests 100;

    sendfile on;
    tcp_nopush on;
    server_tokens off;

    upstream api {
        server api:8080;
    }

    server {
        listen 80;
        listen [::]:80;

        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self'; connect-src 'self'; form-action 'self'; frame-ancestors 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header X-Frame-Options "DENY" always;

        location = /api/submissions {
            limit_req zone=submit_ip burst=5 nodelay;
            limit_conn conn_ip 10;

            proxy_request_buffering off;

            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        location /api/submissions/ {
            limit_req zone=poll_ip burst=30;

            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        location / {
            limit_req zone=poll_ip burst=30;

            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
        }
    }
}
