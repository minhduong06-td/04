<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}}</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
  <h1>Submission Result</h1>
  <p>Submission ID: <code>{{.SubmissionID}}</code></p>

  <div id="poll-area" data-submission-id="{{.SubmissionID}}" data-poll-url="{{.PollEndpoint}}">
    <div id="status-display" class="status">Status: <span id="status-text">Loading...</span></div>

    <table id="result-table" style="display:none;">
      <tr><th>Status</th><td id="r-status"></td></tr>
      <tr><th>Created</th><td id="r-created"></td></tr>
      <tr><th>Started</th><td id="r-started"></td></tr>
      <tr><th>Finished</th><td id="r-finished"></td></tr>
      <tr><th>Compile Success</th><td id="r-compile-success"></td></tr>
      <tr><th>Exit Code</th><td id="r-exit-code"></td></tr>
      <tr><th>stdout</th><td id="r-stdout"></td></tr>
      <tr><th>stderr</th><td id="r-stderr"></td></tr>
      <tr><th>Truncated</th><td id="r-truncated"></td></tr>
    </table>
  </div>

  <a href="/">Back to submit</a>
</div>
<script src="/static/script.js"></script>
</body>
</html>
